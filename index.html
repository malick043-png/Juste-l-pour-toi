<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://serveur-juste-la-pour-toi.onrender.com https://fonts.googleapis.com https://fonts.gstatic.com">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Juste là pour toi">
  <title>Juste là pour toi</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.3s, color 0.3s; }
    body { font-family: 'DM Sans', Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* LIGHT MODE */
    body.light { background: #f0f6ff; color: #0C447C; }
    body.light .messages { background: #f0f6ff; }
    body.light .bubble.assistant { background: #fff; color: #0C447C; border: 0.5px solid #B5D4F4; }
    body.light .bubble.user { background: #185FA5; color: #fff; }
    body.light .input-area, body.light .bottom-bar { background: #fff; border-color: #B5D4F4; }
    body.light textarea { background: #f7faff; color: #0C447C; border-color: #B5D4F4; }
    body.light .suggestion-btn { background: #fff; color: #185FA5; border-color: #B5D4F4; }
    body.light .suggestion-btn:hover { background: #E6F1FB; }
    body.light #accueil { background: linear-gradient(160deg, #E6F1FB 0%, #f0f6ff 60%, #fff 100%); }
    body.light .accueil-titre { color: #0C447C; }
    body.light .prenom-input { background: #fff; color: #0C447C; border-color: #B5D4F4; }
    body.light .btn-reset { background: rgba(255,255,255,0.15); color: #fff; }

    /* DARK MODE */
    body.dark { background: #0d1b2a; color: #B5D4F4; }
    body.dark .messages { background: #0d1b2a; }
    body.dark .bubble.assistant { background: #1a2d42; color: #B5D4F4; border: 0.5px solid #185FA5; }
    body.dark .bubble.user { background: #185FA5; color: #fff; }
    body.dark .input-area, body.dark .bottom-bar { background: #112233; border-color: #185FA5; }
    body.dark textarea { background: #1a2d42; color: #B5D4F4; border-color: #185FA5; }
    body.dark textarea::placeholder { color: #378ADD; }
    body.dark .suggestion-btn { background: #1a2d42; color: #85B7EB; border-color: #185FA5; }
    body.dark .suggestion-btn:hover { background: #185FA5; color: #fff; }
    body.dark #accueil { background: linear-gradient(160deg, #0d1b2a 0%, #112233 100%); }
    body.dark .accueil-titre { color: #B5D4F4; }
    body.dark .accueil-sous { color: #85B7EB; }
    body.dark .prenom-input { background: #1a2d42; color: #B5D4F4; border-color: #185FA5; }
    body.dark .prenom-input::placeholder { color: #378ADD; }
    body.dark .accueil-label { color: #85B7EB; }
    body.dark .accueil-footer { color: #378ADD; }
    body.dark .date-divider::before, body.dark .date-divider::after { background: #185FA5; }
    body.dark .date-divider span { color: #378ADD; }
    body.dark .bubble-time { color: #378ADD; }
    body.dark .bottom-bar span { color: #378ADD; }
    body.dark .wave { background: #185FA5; }
    body.dark .wave::after { background: #0d1b2a; }
    body.dark .btn-reset { background: rgba(255,255,255,0.1); color: #B5D4F4; }

    /* PAGE D'ACCUEIL */
    #accueil { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 30px 24px; text-align: center; }
    .logo-accueil { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #B5D4F4; margin-bottom: 20px; }
    .accueil-titre { font-family: 'Lora', serif; font-size: 28px; margin-bottom: 8px; }
    .accueil-sous { font-size: 15px; color: #378ADD; margin-bottom: 32px; }
    .accueil-label { font-size: 13px; color: #85B7EB; margin-bottom: 10px; }
    .prenom-input { border: 1.5px solid #B5D4F4; border-radius: 20px; padding: 12px 20px; font-size: 15px; font-family: 'DM Sans', sans-serif; outline: none; width: 100%; max-width: 300px; text-align: center; margin-bottom: 16px; }
    .btn-commencer { background: #185FA5; color: #fff; border: none; border-radius: 24px; padding: 13px 36px; font-size: 15px; font-family: 'DM Sans', sans-serif; cursor: pointer; font-weight: 500; width: 100%; max-width: 300px; margin-bottom: 16px; }
    .btn-commencer:hover { opacity: 0.88; }
    .accueil-footer { margin-top: 16px; font-size: 11px; color: #85B7EB; font-style: italic; font-family: 'Lora', serif; }
    .dark-toggle-accueil { background: none; border: 1px solid #B5D4F4; border-radius: 20px; padding: 7px 16px; font-size: 12px; cursor: pointer; color: #85B7EB; font-family: 'DM Sans', sans-serif; }

    /* PAGE CHAT */
    #chat { display: none; flex-direction: column; height: 100vh; }
    .header { background: #185FA5; padding: 14px 18px; position: relative; overflow: hidden; }
    .header-deco { position: absolute; top: -20px; right: -20px; width: 100px; height: 100px; border-radius: 50%; background: rgba(255,255,255,0.07); }
    .header-deco2 { position: absolute; bottom: -30px; right: 40px; width: 70px; height: 70px; border-radius: 50%; background: rgba(255,255,255,0.05); }
    .header-top { display: flex; align-items: center; gap: 10px; position: relative; }
    .avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 1.5px solid rgba(255,255,255,0.3); }
    .header-text h1 { font-size: 16px; font-weight: 500; color: #fff; font-family: 'Lora', serif; }
    .header-text p { font-size: 11px; color: #B5D4F4; margin-top: 1px; }
    .header-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .btn-reset { border: none; border-radius: 12px; padding: 5px 10px; font-size: 11px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .btn-dark { background: none; border: none; color: #fff; font-size: 18px; cursor: pointer; padding: 4px; }
    .status { display: flex; align-items: center; gap: 6px; margin-top: 8px; position: relative; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #5DCAA5; }
    .status-text { font-size: 11px; color: rgba(255,255,255,0.7); }
    .wave { height: 20px; background: #185FA5; position: relative; }
    .wave::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 20px; border-radius: 50% 50% 0 0 / 100% 100% 0 0; }
    .messages { flex: 1; overflow-y: auto; padding: 14px 14px 8px; display: flex; flex-direction: column; gap: 12px; }
    .date-divider { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
    .date-divider::before, .date-divider::after { content: ''; flex: 1; height: 0.5px; background: #B5D4F4; }
    .date-divider span { font-size: 11px; color: #85B7EB; white-space: nowrap; }
    .bubble-wrap { display: flex; flex-direction: column; }
    .bubble-wrap.user { align-items: flex-end; }
    .bubble { max-width: 78%; padding: 11px 14px; font-size: 14px; line-height: 1.6; }
    .bubble.assistant { border-radius: 16px 16px 16px 4px; align-self: flex-start; }
    .bubble.user { border-radius: 16px 16px 4px 16px; }
    .bubble-time { font-size: 10px; color: #85B7EB; margin-top: 3px; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 14px; }
    .suggestion-btn { border: 1px solid; border-radius: 20px; padding: 7px 14px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; white-space: nowrap; }
    .typing { display: flex; gap: 5px; align-items: center; padding: 12px 16px; border-radius: 16px 16px 16px 4px; align-self: flex-start; }
    body.light .typing { background: #fff; border: 0.5px solid #B5D4F4; }
    body.dark .typing { background: #1a2d42; border: 0.5px solid #185FA5; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #85B7EB; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
    .input-area { padding: 10px 14px; border-top: 0.5px solid; display: flex; gap: 8px; align-items: flex-end; }
    textarea { flex: 1; border: 0.5px solid; border-radius: 20px; padding: 9px 14px; font-size: 14px; font-family: 'DM Sans', Arial, sans-serif; resize: none; max-height: 90px; outline: none; }
    textarea:focus { border-color: #185FA5; }
    .send-btn { width: 38px; height: 38px; border-radius: 50%; background: #185FA5; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; fill: white; }
    .bottom-bar { display: flex; justify-content: center; padding: 6px; border-top: 0.5px solid; }
    .bottom-bar span { font-size: 11px; color: #85B7EB; font-style: italic; font-family: 'Lora', serif; }
  </style>
</head>
<body class="light">

  <!-- PAGE D'ACCUEIL -->
  <div id="accueil">
    <img src="icon.png" class="logo-accueil" alt="Logo">
    <h1 class="accueil-titre">Juste là pour toi</h1>
    <p class="accueil-sous">Ton espace bienveillant de bien-être</p>
    <p class="accueil-label">Comment tu t'appelles ?</p>
    <input type="text" class="prenom-input" id="prenom" placeholder="Ton prénom...">
    <button class="btn-commencer" onclick="commencer()">Commencer la conversation 💙</button>
    <button class="dark-toggle-accueil" onclick="toggleDark()">🌙 Mode sombre</button>
    <p class="accueil-footer">un espace bienveillant, rien que pour toi</p>
  </div>

  <!-- PAGE CHAT -->
  <div id="chat">
    <div class="header">
      <div class="header-deco"></div>
      <div class="header-deco2"></div>
      <div class="header-top">
        <img src="WhatsApp%20Image%202026-04-15%20at%2011.38.39.jpeg" class="avatar" alt="Logo">
        <div class="header-text">
          <h1>Juste là pour toi</h1>
          <p id="header-prenom">Ton espace de bien-être</p>
        </div>
        <div class="header-actions">
          <button class="btn-dark" onclick="toggleDark()" title="Mode sombre">🌙</button>
          <button class="btn-reset" onclick="reinitialiser()">↺ Nouveau</button>
        </div>
      </div>
      <div class="status">
        <div class="status-dot"></div>
        <span class="status-text">Disponible · toujours là pour t'écouter</span>
      </div>
    </div>
    <div class="wave"></div>
    <div class="messages" id="messages">
      <div class="date-divider"><span>aujourd'hui</span></div>
    </div>
    <div class="suggestions" id="suggestions">
      <button class="suggestion-btn" onclick="suggerer('Je me sens stressé')">😰 Je suis stressé</button>
      <button class="suggestion-btn" onclick="suggerer('Je me sens seul')">😔 Je me sens seul</button>
      <button class="suggestion-btn" onclick="suggerer('J\'ai besoin de conseils')">💡 Conseils</button>
      <button class="suggestion-btn" onclick="suggerer('Je veux parler de mes émotions')">💭 Mes émotions</button>
    </div>
    <div class="input-area">
      <textarea id="input" placeholder="Écris ce que tu ressens..." rows="1"></textarea>
      <button class="send-btn" id="btn">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="bottom-bar">
      <span>un espace bienveillant, rien que pour toi</span>
    </div>
  </div>

  <script>
    const SYSTEM = `You are a compassionate and professional wellness assistant for the app "Juste là pour toi" (Just here for you). Your role is to:
- Listen with empathy to understand the user's needs and emotions
- Ask open-ended questions to encourage reflection
- Give simple, kind, and easy-to-apply advice
- VERY IMPORTANT: Always respond in the SAME language the user writes in. If they write in French, respond in French. If they write in English, respond in English. If they write in another language, respond in that language.
- Keep responses to 2-4 sentences maximum.
- Address the user by their first name when natural.`;

    let historique = [];
    let prenom = '';
    let darkMode = false;

    function toggleDark() {
      darkMode = !darkMode;
      document.body.className = darkMode ? 'dark' : 'light';
      localStorage.setItem('darkMode', darkMode);
    }

    if (localStorage.getItem('darkMode') === 'true') {
      darkMode = true;
      document.body.className = 'dark';
    }

    function getTime() {
      return new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
    }

    function commencer() {
      prenom = document.getElementById('prenom').value.trim() || 'toi';
      document.getElementById('accueil').style.display = 'none';
      document.getElementById('chat').style.display = 'flex';
      document.getElementById('header-prenom').textContent = 'Bonjour ' + prenom + ' 💙';
      ajouterMessage('assistant', '💙 Bonjour ' + prenom + ' ! Je suis là pour toi. Comment te sens-tu aujourd\'hui ?');
    }

    function reinitialiser() {
      historique = [];
      document.getElementById('messages').innerHTML = '<div class="date-divider"><span>aujourd\'hui</span></div>';
      document.getElementById('suggestions').style.display = 'flex';
      ajouterMessage('assistant', '💙 Bonjour ' + prenom + ' ! Je suis là pour toi. Comment te sens-tu aujourd\'hui ?');
    }

    function suggerer(texte) {
      document.getElementById('input').value = texte;
      document.getElementById('suggestions').style.display = 'none';
      envoyer();
    }

    function ajouterMessage(role, texte) {
      document.getElementById('suggestions').style.display = 'none';
      const wrap = document.createElement('div');
      wrap.className = 'bubble-wrap' + (role === 'user' ? ' user' : '');
      const bubble = document.createElement('div');
      bubble.className = 'bubble ' + role;
      bubble.textContent = texte;
      const time = document.createElement('div');
      time.className = 'bubble-time';
      time.textContent = getTime();
      wrap.appendChild(bubble);
      wrap.appendChild(time);
      document.getElementById('messages').appendChild(wrap);
      wrap.scrollIntoView({ behavior: 'smooth' });
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing';
      div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
      document.getElementById('messages').appendChild(div);
      div.scrollIntoView({ behavior: 'smooth' });
    }

    function removeTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    async function envoyer() {
      const input = document.getElementById('input');
      const texte = input.value.trim();
      if (!texte || document.getElementById('btn').disabled) return;
      ajouterMessage('user', texte);
      historique.push({ role: 'user', content: texte });
      input.value = '';
      input.style.height = 'auto';
      document.getElementById('btn').disabled = true;
      showTyping();
      try {
        const res = await fetch('https://serveur-juste-la-pour-toi.onrender.com/message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-opus-4-5',
            max_tokens: 1000,
            system: SYSTEM + ' The user\'s first name is ' + prenom + '.',
            messages: historique
          })
        });
        const data = await res.json();
        const reponse = data.content[0].text;
        historique.push({ role: 'assistant', content: reponse });
        removeTyping();
        ajouterMessage('assistant', reponse);
      } catch(e) {
        removeTyping();
        ajouterMessage('assistant', '😔 Désolé, une erreur est survenue. Réessaie dans un moment.');
      }
      document.getElementById('btn').disabled = false;
      input.focus();
    }

    document.getElementById('btn').addEventListener('click', envoyer);
    document.getElementById('input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); envoyer(); }
    });
    document.getElementById('input').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 90) + 'px';
    });
    document.getElementById('prenom').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') commencer();
    });
  </script>
</body>
</html>
